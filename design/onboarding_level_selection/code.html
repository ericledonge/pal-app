<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>

<title>Onboarding - Action Lévis</title>

                        "error": "#ba1a1a",

                        "primary": "#a63600",

                        "on-secondary-fixed-variant": "#5e4200",
                        "secondary-fixed": "#ffdea8",

                        "secondary": "#7c5800",

                        "on-background": "#191c1e",
                        "on-primary-fixed": "#380d00",
                        "surface-container-low": "#f3f4f6",
                        "surface-container-highest": "#e1e2e4",

                        "gutter": "16px",
                        "xs": "4px",
                        "md": "16px",
                        "sm": "8px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Lexend"],
                        "body-lg": ["Lexend"],
                        "timer-display": ["Lexend"],

                        "timer-display": ["48px", { "lineHeight": "48px", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }],

                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]

                }

<style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f8f9fb; /* bg-background */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .level-chip input:checked + div {
            background-color: #a63600; /* bg-primary */
            color: #ffffff; /* text-on-primary */
            border-color: #a63600;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between bg-background text-on-background">
<!-- Content Area -->
<main class="flex-grow flex flex-col items-center px-margin-mobile pt-12 pb-24 w-full max-w-md mx-auto">
<!-- Logo -->
<div class="mb-lg w-full flex justify-center">
<img alt="Action Lévis Logo" class="h-16 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnApg31K1ULrx75vD9s1Ft4CCNzv6asvuyrp2JAQ_qYQik_VbA_9m25-_lOr_Us5axk9k1ywfZQncJ295tfhmJaGEDv-Ce9Q0I_Uggr1UZPSimDyc9D_7XxTFgBTF5qnfBc4WyqpiXszcgiKHJDbYHuM28so7MakD2e80aeepY3pkmizpzXc41h0BIJMxly1oqBYSJISrUogYM9QeCcnL-BDdNzmodZ-66vVJ99t8qtJuCFRLzE8uD7RbOzHv7PLKBnO_rHiGx-co"/>
</div>
<!-- Welcome Text -->
<div class="text-center mb-xl w-full">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Bienvenue chez Action Lévis!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Prêt à jouer? Sélectionnez votre niveau actuel pour voir les sessions qui vous correspondent.</p>
</div>
<!-- Level Selector -->
<div class="w-full bg-surface-container-lowest rounded-xl border border-surface-variant p-md shadow-sm mb-lg">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-md">Choisissez votre niveau</h2>
<!-- Explanation Box -->
<div class="bg-surface-container-low rounded-lg p-sm mb-md flex gap-sm items-start border border-outline-variant">
<span class="material-symbols-outlined text-primary mt-1">info</span>
<div class="font-body-md text-body-md text-on-surface-variant">
<p><strong class="text-on-surface">C (Consolidation) :</strong> Vous consolidez vos acquis à ce niveau.</p>
<p><strong class="text-on-surface mt-1 block">T (Transition) :</strong> Vous êtes en transition vers le niveau supérieur.</p>
</div>
</div>
<!-- Chips Grid -->
<div class="grid grid-cols-3 gap-sm">
<!-- 2.0C -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="2.0C"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        2.0C
                    </div>
</label>
<!-- 2.0T -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="2.0T"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        2.0T
                    </div>
</label>
<!-- 2.5C -->
<label class="level-chip cursor-pointer">
<input checked="" class="sr-only" name="player_level" type="radio" value="2.5C"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        2.5C
                    </div>
</label>
<!-- 2.5T -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="2.5T"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        2.5T
                    </div>
</label>
<!-- 3.0C -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="3.0C"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        3.0C
                    </div>
</label>
<!-- 3.0T -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="3.0T"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        3.0T
                    </div>
</label>
<!-- 3.5C -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="3.5C"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        3.5C
                    </div>
</label>
<!-- 3.5T -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="3.5T"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        3.5T
                    </div>
</label>
<!-- 4.0C -->
<label class="level-chip cursor-pointer">
<input class="sr-only" name="player_level" type="radio" value="4.0C"/>
<div class="flex items-center justify-center py-sm px-2 rounded-lg border border-outline-variant text-on-surface-variant font-label-lg text-label-lg transition-colors duration-200 hover:bg-surface-container">
                        4.0C
                    </div>
</label>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-surface-variant p-margin-mobile flex justify-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<button class="w-full max-w-md bg-primary text-on-primary font-label-lg text-label-lg py-3 px-6 rounded-full flex items-center justify-center gap-2 hover:bg-primary-container active:scale-[0.98] transition-all duration-200 shadow-sm">
<span>Commencer</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</body></html>
