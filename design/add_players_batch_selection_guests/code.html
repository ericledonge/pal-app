<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.member-checkbox');
            const countDisplay = document.getElementById('selection-count');
            const batchBtn = document.getElementById('batch-add-btn');

            // Initial state
            updateCount();

            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    // Add a subtle flash effect to the row when selected
                    if (cb.checked) {
                        const row = cb.closest('label');
                        row.classList.add('bg-primary-fixed/20');
                        setTimeout(() => row.classList.remove('bg-primary-fixed/20'), 300);
                    }
                    updateCount();
                });
            });

            function updateCount() {
                const count = document.querySelectorAll('.member-checkbox:checked').length;
                countDisplay.textContent = count;
                
                if (count > 0) {
                    batchBtn.classList.remove('opacity-50', 'bg-surface-variant', 'text-on-surface-variant', 'border-transparent');
                    batchBtn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg');
                    batchBtn.disabled = false;
                } else {
                    batchBtn.classList.add('opacity-50', 'bg-surface-variant', 'text-on-surface-variant', 'border-transparent');
                    batchBtn.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg');
                    // We don't actually disable it entirely so it feels responsive, but visually it's distinct
                    // In a real app, clicking with 0 might show a toast "Select members first"
                }
                
                // Pop animation on counter
                countDisplay.classList.add('scale-150', 'text-secondary-fixed');
                setTimeout(() => countDisplay.classList.remove('scale-150', 'text-secondary-fixed'), 150);
            }
        });
    </script>
